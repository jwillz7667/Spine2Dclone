name: CI

on:
  pull_request:
  push:
    branches: [main]

# PR runs cancel superseded runs; main runs never cancel (cache + release integrity).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_TELEMETRY_DISABLED: '1'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Prettier formatting check (code and config; markdown is excluded)
        run: pnpm format:check
      - name: Em-dash / en-dash guard (INV-6)
        run: pnpm check:dashes

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  format-semver:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check:format-semver
      - run: pnpm check:format-version-stable

  package-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Phase-0 forbidden-package guard (LAW 5)
        run: pnpm check:packages

  phase3-acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Phase 3 particle conformance (runtime-core matches committed fixtures, WP-3.10)
        run: pnpm conformance:particles
      - name: Phase 3 DoD acceptance (megaWin bundle plays; caps + determinism, WP-3.11)
        run: pnpm phase3:acceptance

  commitlint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Lint PR commits (Conventional Commits)
        run: >
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}

  # Required status check for this workflow. Its dependency set grows per phase (conformance-and-ci D.13);
  # Phase 0 = typecheck, lint, test, build, format-semver, package-guard. Phase 3 adds the
  # phase3-acceptance gate (the milestone DoD: particle conformance + the megaWin acceptance harness).
  #
  # The native runtimes (Unity C# core, Godot headless) gate through a SEPARATE required check,
  # `conformance-native-pass` in conformance-native.yml, not through this job's `needs` (TASK-5.5.6). They
  # live in their own path-filtered + nightly workflow because the engine jobs are heavier and only a
  # runtimes / format / runtime-core / conformance change can move native conformance; folding them into
  # ci-pass would run a dotnet restore and a pinned Godot download on every docs-only PR. The repo owner
  # therefore marks TWO checks required in branch protection: `ci-pass` AND `conformance-native-pass`.
  ci-pass:
    runs-on: ubuntu-latest
    if: always()
    needs: [typecheck, lint, test, build, format-semver, package-guard, phase3-acceptance]
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required checks failed."
            exit 1
          fi
          echo "All required Phase-0 checks passed."
